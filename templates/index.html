<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shuffle Dance - 영상 공유</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">Shuffle Dance</a>
        </div>
    </nav>

    <header class="hero">
        <div class="container">
            <h1>Shuffle Dance</h1>
            <p class="hero-desc">셔플댄스 연습 영상과 레슨 자료를 공유합니다</p>
        </div>
    </header>

    <main class="container">
        <section class="drive-section">
            <div class="drive-toolbar">
                <h2>영상 갤러리 <span class="video-count">({{ videos|length }}개)</span></h2>
            </div>

            {% if videos %}
            <div class="video-grid">
                {% for v in videos %}
                <div class="video-card" onclick="openPlayer('{{ v.play }}', '{{ v.display|e }}')">
                    <div class="video-thumb">
                        <img src="{{ v.preview }}" alt="{{ v.display }}" loading="lazy"
                             onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                        <div class="thumb-fallback">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="rgba(255,255,255,0.3)">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </div>
                        <div class="play-overlay">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="white">
                                <path d="M8 5v14l11-7z"/>
                            </svg>
                        </div>
                    </div>
                    <div class="video-info">
                        <p class="video-title">{{ v.display }}</p>
                    </div>
                </div>
                {% endfor %}
            </div>
            {% else %}
            <div class="empty-state">
                <p>영상을 불러올 수 없습니다.</p>
            </div>
            {% endif %}
        </section>
    </main>

    <!-- 영상 플레이어 모달 -->
    <div class="modal-overlay" id="playerModal" onclick="closePlayer(event)">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle"></h3>
                <button class="modal-close" onclick="closePlayer(event)">&times;</button>
            </div>
            <div class="modal-body">
                <iframe id="modalPlayer" src="" allowfullscreen allow="autoplay"></iframe>
            </div>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>Shuffle Dance &copy; 2026</p>
        </div>
    </footer>

    <script>
    function openPlayer(src, title) {
        document.getElementById('modalPlayer').src = src;
        document.getElementById('modalTitle').textContent = title;
        document.getElementById('playerModal').classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closePlayer(e) {
        if (e) e.stopPropagation();
        const modal = document.getElementById('playerModal');
        if (e && e.target !== modal && !e.target.classList.contains('modal-close')) return;
        modal.classList.remove('active');
        document.getElementById('modalPlayer').src = '';
        document.body.style.overflow = '';
    }

    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            document.getElementById('playerModal').classList.remove('active');
            document.getElementById('modalPlayer').src = '';
            document.body.style.overflow = '';
        }
    });
    </script>
</body>
</html>
